name: CI

on:
  push:
    branches: [main, master]
    paths:
      - '.github/workflows/ci.yml'
      - 'docker-compose.yml'
      - '.env.example'
      - 'scripts/**'
      - 'tests/**'
      - 'examples/**'
      - 'Makefile'
  pull_request:
    branches: [main, master]
    paths:
      - '.github/workflows/ci.yml'
      - 'docker-compose.yml'
      - '.env.example'
      - 'scripts/**'
      - 'tests/**'
      - 'examples/**'
      - 'Makefile'

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate repository contract
        run: |
          chmod +x scripts/*.sh tests/e2e/*.sh
          make validate-repo

      - name: Run smoke test
        run: |
          chmod +x scripts/*.sh tests/e2e/*.sh
          make smoke
